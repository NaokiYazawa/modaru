name: Release

# GitHub の Release を publish した時に npm へ公開する。
# 発火トリガと npm 側の Trusted Publisher 設定 (workflow filename = release.yml) を一致させること。
on:
  release:
    types: [published]

# OIDC Trusted Publishing に必須。id-token: write が無いとトークン交換ができない。
# contents: read は checkout 用。トークン (NPM_TOKEN) は不要。
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      # publish は npm CLI で実行する (bun publish は OIDC Trusted Publishing 非対応)。
      # Trusted Publishing は npm >= 11.5.1 / Node >= 22.14 が必須。
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Node 24 同梱の npm が 11.5.1 未満のケースに備えて最新へ更新。
      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Release タグ (vX.Y.Z) と package.json の version がズレたまま公開する事故を防ぐ。
      - name: Verify release tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Release tag ($TAG) does not match package.json version ($PKG)"
            exit 1
          fi

      # npm publish が prepublishOnly (check-types / test / build) を実行してから dist を公開。
      # Trusted Publishing 有効時は provenance が自動付与される (--provenance で明示)。
      # unscoped パッケージは既定で public だが --access public を明示しておく。
      - name: Publish to npm
        run: npm publish --provenance --access public
